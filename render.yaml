# Render Blueprint - lets Render configure the app automatically from this file.
services:
  - type: web
    name: pdf-chat-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # $PORT is provided by Render; binding to 0.0.0.0 makes the app reachable.
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # secrets are entered in the Render dashboard, not in this file
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false          # set to your PostgreSQL connection string in production
      - key: PYTHON_VERSION
        value: "3.12.4"
