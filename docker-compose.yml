# Runs the whole stack locally with one command: docker compose up
#   - api:    the FastAPI backend (this project)
#   - qdrant: the vector database (stores document embeddings)
#   - db:     PostgreSQL (stores user accounts)
#
# Secrets (GOOGLE_API_KEY, JWT_SECRET) come from your .env file.

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # These point the app at the other containers, overriding any .env values.
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=postgresql://pdfchat:pdfchat@db:5432/pdfchat
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    # No host port mapping needed: the api reaches Qdrant over the internal
    # Docker network (http://qdrant:6333). This also avoids clashing with any
    # Qdrant already running on your machine.
    expose:
      - "6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=pdfchat
      - POSTGRES_PASSWORD=pdfchat
      - POSTGRES_DB=pdfchat
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      # The api waits until Postgres is actually ready to accept connections.
      test: ["CMD-SHELL", "pg_isready -U pdfchat"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_storage:
  postgres_storage:
